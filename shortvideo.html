<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Short Video</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --gold: #ffd700;
    --gold-dim: rgba(255,215,0,0.15);
    --gold-border: rgba(255,215,0,0.45);
    --white: #ffffff;
    --overlay: rgba(0,0,0,0.35);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* ── Feed container ── */
  #feed {
    width: 100%; height: 100%;
    position: relative;
    overflow: hidden;
  }

  /* ── Individual video slide ── */
  .slide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.25s;
    pointer-events: none;
  }
  .slide.active {
    opacity: 1; pointer-events: all;
  }

  /* Pexels background video */
  .slide video, .slide iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    border: none;
  }

  /* Dark gradient overlays */
  .overlay-top {
    position: absolute; top: 0; left: 0; right: 0; height: 120px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.65), transparent);
    pointer-events: none; z-index: 5;
  }
  .overlay-bottom {
    position: absolute; bottom: 0; left: 0; right: 0; height: 280px;
    background: linear-gradient(to top, rgba(0,0,0,0.80), transparent);
    pointer-events: none; z-index: 5;
  }

  /* ── Top bar ── */
  #top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    padding: 14px 16px 8px;
    display: flex; align-items: center; justify-content: flex-end;
  }
  #token-badge {
    background: var(--gold-dim);
    border: 1px solid var(--gold-border);
    border-radius: 20px; padding: 4px 10px;
    font-size: 12px; color: var(--gold); font-weight: 600;
    transition: transform 0.2s;
  }
  #token-badge.bump { transform: scale(1.2); }

  /* ── Bottom info: user + caption ── */
  .info-area {
    position: absolute; bottom: 110px; left: 14px; right: 72px; z-index: 10;
  }
  .username { color: #fff; font-weight: 700; font-size: 15px; margin-bottom: 5px; }
  .caption { color: rgba(255,255,255,0.88); font-size: 13px; line-height: 1.45; }

  /* ── Right sidebar actions ── */
  .right-actions {
    position: absolute; bottom: 110px; right: 10px; z-index: 10;
    display: flex; flex-direction: column; align-items: center; gap: 18px;
  }
  .action { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
  .action-circle {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; transition: transform 0.15s;
  }
  .action-circle:active { transform: scale(0.9); }
  .action span { color: #fff; font-size: 11px; text-align: center; }
  /* ── Progress bar ── */
  #progress-wrap {
    position: fixed; bottom: 94px; left: 0; right: 0; z-index: 20;
    padding: 0 14px;
  }
  #progress-track {
    height: 2.5px; background: rgba(255,255,255,0.25); border-radius: 2px;
  }
  #progress-fill {
    height: 100%; background: #fff; border-radius: 2px;
    width: 0%; transition: width 0.5s linear;
  }

  /* ── Reaction bar ── */
  #reactions {
    position: fixed; bottom: 12px; left: 0; right: 0; z-index: 20;
    display: flex; gap: 8px; justify-content: center; padding: 0 10px;
  }
  .react-btn {
    flex: 1; max-width: 64px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 24px; padding: 7px 6px;
    display: flex; flex-direction: column; align-items: center; gap: 1px;
    cursor: pointer; transition: background 0.2s, transform 0.15s;
    touch-action: manipulation;
  }
  .react-btn:active { transform: scale(0.92); }
  .react-btn.tapped {
    background: rgba(255,255,255,0.28);
    border-color: rgba(255,255,255,0.7);
  }
  .react-btn .emoji { font-size: 18px; line-height: 1; }
  .react-btn .rcount { color: #fff; font-size: 10px; }

  /* ── Toast notifications ── */
  #toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: rgba(20,20,20,0.9);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px; padding: 8px 18px;
    color: #fff; font-size: 13px;
    opacity: 0; transition: opacity 0.25s, transform 0.25s;
    z-index: 50; white-space: nowrap;
    backdrop-filter: blur(8px);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Daily pick panel ── */
  #daily-pick {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
    background: rgba(10,10,10,0.95);
    border-top: 1px solid rgba(255,255,255,0.12);
    padding: 16px 14px 24px;
    transform: translateY(100%); transition: transform 0.3s ease;
    backdrop-filter: blur(12px);
  }
  #daily-pick.open { transform: translateY(0); }
  #daily-pick h3 { color: #fff; font-size: 14px; margin-bottom: 4px; }
  #daily-pick p { color: rgba(255,255,255,0.5); font-size: 12px; margin-bottom: 14px; }
  .pick-options { display: flex; gap: 8px; }
  .pick-option {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; padding: 12px 8px;
    cursor: pointer; text-align: center;
    transition: background 0.2s, border-color 0.2s;
    touch-action: manipulation;
  }
  .pick-option:active { background: rgba(255,255,255,0.15); }
  .pick-option.chosen {
    background: rgba(114,9,183,0.25);
    border-color: rgba(114,9,183,0.7);
  }
  .pick-option .pick-icon { font-size: 22px; display: block; margin-bottom: 5px; }
  .pick-option .pick-label { color: rgba(255,255,255,0.8); font-size: 11px; }
  #daily-pick-close {
    position: absolute; top: 12px; right: 14px;
    color: rgba(255,255,255,0.4); font-size: 20px; cursor: pointer;
  }

  /* swipe hint arrow */
  #swipe-hint {
    position: fixed; bottom: 96px; right: 16px; z-index: 15;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    opacity: 0.5; animation: bounce 1.5s infinite;
    pointer-events: none;
  }
  #swipe-hint span { color: #fff; font-size: 10px; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
</style>
</head>
<body>

<div id="toast"></div>

 <div id="mute-toggle-overlay" onclick="toggleGlobalVideoMute(event)" style="position: fixed; bottom: 160px; right: 16px; z-index: 25; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer;">
  🔊
</div>
 
<!-- Top navigation bar -->
<div id="top-bar">
  <div id="token-badge">0 tokens</div>
</div>

<!-- Progress bar -->
<div id="progress-wrap">
  <div id="progress-track"><div id="progress-fill"></div></div>
</div>

<!-- Reaction buttons -->
<div id="reactions">
  <div class="react-btn" data-emoji="🔥" onclick="react(this)">
    <span class="emoji">🔥</span><span class="rcount">0</span>
  </div>
  <div class="react-btn" data-emoji="😴" onclick="react(this)">
    <span class="emoji">😴</span><span class="rcount">0</span>
  </div>
  <div class="react-btn" data-emoji="😂" onclick="react(this)">
    <span class="emoji">😂</span><span class="rcount">0</span>
  </div>
  <div class="react-btn" data-emoji="🤯" onclick="react(this)">
    <span class="emoji">🤯</span><span class="rcount">0</span>
  </div>
  <div class="react-btn" data-emoji="❤️" onclick="react(this)">
    <span class="emoji">❤️</span><span class="rcount">0</span>
  </div>
</div>

<!-- Swipe hint -->
<div id="swipe-hint">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
    <path d="M12 5v14M5 12l7 7 7-7" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </svg>
  <span>swipe</span>
</div>

<!-- Feed -->
<div id="feed"></div>

<!-- Daily pick panel -->
<div id="daily-pick">
  <span id="daily-pick-close" onclick="closeDailyPick()">&#x2715;</span>
  <h3>Which would you share with a friend?</h3>
  <p>One tap · earn 1 token</p>
  <div class="pick-options" id="pick-options"></div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
const YOUTUBE_API_KEY = 'YOUR_YOUTUBE_DATA_API_V3_KEY'; // paste your key here

// category queries — rotated randomly on each load
const YT_QUERIES = [
  'funny animals compilation',
  'funny videos trending',
  'quick recipe viral',
  'restaurant review short',
  'trick shots highlights',
  'sports best moments',
  'satisfying DIY restoration',
  'family parenting funny moments',
  'movie recap trending',
  'life hacks viral',
  'street food around the world',
  'cute baby funny moments',
  'dance challenge trending',
  'before and after transformation',
  'prank reactions compilation',
  'luxury homes and tours',
  'car modifications satisfying',
  'nature and wildlife amazing',
  'street interviews funny',
  'tv show edit trending',
  'pet rescue heartwarming',
  'funny pet moments',
  'tech gadget review short',
  'educational facts quick',
  'personal finance tips short',
  'AI tutorial short',
  'travel hidden gem',
  'makeup transformation quick',
  'fitness workout short',
  'ASMR satisfying videos',
  'history facts short',
  'science experiments satisfying',
  'magic tricks revealed',
  'motivational success stories',
  'architecture and beautiful places'
];

const DM_QUERIES = [
  'funny animals',
  'satisfying videos',
  'food recipe short',
  'travel destinations',
  'fitness transformation'
];

// ── State ────────────────────────────────────────────────────────────────────
let tokenBalance = 0;
let currentIndex  = 0;
let slides        = [];
let progressTimer = null;
let progressVal   = 0;
let videoStartTime = null;
let sessionReactions = {}; // { emoji: count }
let sessionStamps = [];    // [ { videoId, displayName, timestamp } ]
let sessionPicks  = [];    // [ { chosen, options } ]
let dailyPickShown = false;
let videoAdSeconds          = 0;
let adBreakThresholdReached = false;
let videoAdActive           = false;
let videoAdTimerInterval    = null;
let videoTokenTimer         = null; // minute-based watch timer
let slideIsActive           = false; // used by ad timer for iframe-compatible tracking

 
// Demo video pool (used as fallback + supplement when Pexels key is absent)
const DEMO_VIDEOS = [
  {
    id: 'demo_001',                  // internal id — sent to Godot, never shown
    videoUrl: 'https://www.w3schools.com/html/mov_bbb.mp4',
    displayName: 'Forest Stream Loop',  // shown on screen
    caption: 'Watch this and react below to earn tokens #explore',
    thumbnail: ''
  },
  {
    id: 'demo_002',
    videoUrl: 'https://www.w3schools.com/html/movie.mp4',
    displayName: 'City Night Drive',
    caption: 'How are you feeling today? React and earn #mood',
    thumbnail: ''
  },
  {
    id: 'demo_003',
    videoUrl: 'https://www.w3schools.com/html/mov_bbb.mp4',
    displayName: 'Sunset Timelapse',
    caption: 'Would you share this? See the daily pick below!',
    thumbnail: ''
  }
];

let isGlobalMuted = true; // Match standard browser autoplay constraint variables

function toggleGlobalVideoMute(event) {
  if (event) event.stopPropagation();
  isGlobalMuted = !isGlobalMuted;

  const icon = document.getElementById('mute-toggle-overlay');
  if (icon) icon.textContent = isGlobalMuted ? '🔇' : '🔊';

  const activeSlide = document.querySelectorAll('.slide')[currentIndex];
  const type = slides[currentIndex]?.type;

  if (type === 'demo') {
    const vid = activeSlide?.querySelector('video');
    if (vid) vid.muted = isGlobalMuted;
  } else {
    // For iframes: re-inject with updated mute parameter
    _injectIframe(activeSlide, slides[currentIndex]);
  }
}



// ── Modified Video Clock Watcher Routine ──
function startVideoTokenTimer() {
  clearInterval(videoTokenTimer);
  let elapsedSeconds = 0;
  videoTokenTimer = setInterval(() => {
    if (!slideIsActive || videoAdActive) return;
    elapsedSeconds += 5;
    if (elapsedSeconds >= 60) {
      addTokens(1, 'watching a video');
      elapsedSeconds = 0;
    }
  }, 5000);
}
 
function startVideoAdTimer() {
  if (videoAdTimerInterval) return;
  videoAdTimerInterval = setInterval(() => {
    if (videoAdActive) return;
    if (!slideIsActive) return; // only count when a slide is actually displaying
    videoAdSeconds++;
    if (videoAdSeconds >= 180) {
      adBreakThresholdReached = true;
      videoAdSeconds = 0;
    }
  }, 1000);
}

// Called by the page when conditions are met (pause or swipe).
function triggerVideoAdBreak() {
  videoAdActive = true;
  adBreakThresholdReached = false;
  postToGodot({ type: 'show_interstitial' });
}

// Called by Godot via executeJavaScript("resumePlayback();") after the ad closes.
// Called by Godot via executeJavaScript("resumePlayback();") after the ad closes.
function resumePlayback() {
  videoAdActive = false;
  slideIsActive = true;
  const activeSlide = document.querySelectorAll('.slide')[currentIndex];
  const type = slides[currentIndex]?.type;

  if (type === 'demo') {
    const vid = activeSlide?.querySelector('video');
    if (vid) {
      vid.play().catch(() => {});
      startProgress(vid);
    }
  } else {
    // For iframe types: re-inject the iframe with autoplay to resume
    _injectIframe(activeSlide, slides[currentIndex]);
  }
  showCenterIcon('▶');
  startVideoAdTimer();
}
 
// ── Token helpers ─────────────────────────────────────────────────────────────
function addTokens(n, label) {
  tokenBalance += n;
  const badge = document.getElementById('token-badge');
  badge.textContent = tokenBalance + ' token' + (tokenBalance !== 1 ? 's' : '');
  badge.classList.add('bump');
  setTimeout(() => badge.classList.remove('bump'), 300);
  showToast((n > 0 ? '+' + n : n) + ' ' + (n === 1 ? 'token' : 'tokens') + ' — ' + label);
  postToGodot({ type: 'tokens', delta: n, total: tokenBalance, reason: label });
}

function postToGodot(data) {
  // Bridge to Godot via URL scheme if available
  try {
    if (window.JavaScriptBridge) {
      window.JavaScriptBridge.call('receive_video_data', JSON.stringify(data));
    }
  } catch(e) {}
  console.log('[Godot bridge]', JSON.stringify(data));
}

// ── Toast ────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Build slides ──────────────────────────────────────────────────────────────
async function loadVideos() {
  let videos = [];

  // ── YouTube ──────────────────────────────────────────────────────────────
  if (YOUTUBE_API_KEY && YOUTUBE_API_KEY !== 'YOUR_YOUTUBE_DATA_API_V3_KEY') {
    try {
      const query = YT_QUERIES[Math.floor(Math.random() * YT_QUERIES.length)];
      const res = await fetch(
        `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&q=${encodeURIComponent(query)}&maxResults=5&key=${YOUTUBE_API_KEY}`
      );
      const data = await res.json();
      if (data.items) {
        data.items.forEach(item => {
          videos.push({
            id: 'yt_' + item.id.videoId,        // internal — Godot only
            type: 'youtube',
            youtubeId: item.id.videoId,
            displayName: item.snippet.channelTitle,
            caption: item.snippet.title,
            category: query
          });
        });
      }
    } catch(e) { console.warn('YouTube fetch failed:', e); }
  }

  // ── Dailymotion ───────────────────────────────────────────────────────────
  try {
    const dmQuery = DM_QUERIES[Math.floor(Math.random() * DM_QUERIES.length)];
    const res = await fetch(
      `https://api.dailymotion.com/videos?fields=id,title,owner.screenname&search=${encodeURIComponent(dmQuery)}&flags=vertical&limit=5&language=en`
    );
    const data = await res.json();
    if (data.list) {
      data.list.forEach(v => {
        videos.push({
          id: 'dm_' + v.id,                     // internal — Godot only
          type: 'dailymotion',
          dailymotionId: v.id,
          displayName: v['owner.screenname'] || 'Creator',
          caption: v.title,
          category: dmQuery
        });
      });
    }
  } catch(e) { console.warn('Dailymotion fetch failed:', e); }

  // ── Demo fallback ─────────────────────────────────────────────────────────
  // Always included so the feed never shows empty
  videos = [...videos, ...DEMO_VIDEOS];

  // Shuffle to mix sources
  slides = videos.sort(() => Math.random() - 0.5);
  buildFeed();
}

 // ── Iframe injection helper ───────────────────────────────────────────────────
// Creates and injects an iframe for YouTube or Dailymotion into a slide.
// Called both during initial buildFeed and when resuming after an ad break.
function _injectIframe(slideEl, videoMeta) {
  // Remove any existing iframe in this slide
  const old = slideEl.querySelector('iframe');
  if (old) old.remove();

  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;';
  iframe.setAttribute('allowfullscreen', '');
  iframe.setAttribute('allow', 'autoplay; fullscreen');

  if (videoMeta.type === 'youtube') {
    iframe.src = `https://www.youtube.com/embed/${videoMeta.youtubeId}?autoplay=1&controls=0&modestbranding=1&playsinline=1&loop=1&playlist=${videoMeta.youtubeId}&mute=${isGlobalMuted ? 1 : 0}`;
  } else if (videoMeta.type === 'dailymotion') {
    iframe.src = `https://geo.dailymotion.com/player.html?video=${videoMeta.dailymotionId}&autoplay=true&mute=${isGlobalMuted}&controls=false&ui-start-screen-info=false&loop=true`;
  }

  // Insert before the overlay divs so overlays sit on top
  const firstOverlay = slideEl.querySelector('.overlay-top');
  if (firstOverlay) {
    slideEl.insertBefore(iframe, firstOverlay);
  } else {
    slideEl.appendChild(iframe);
  }
}
 
function buildFeed() {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  slides.forEach((v, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === 0 ? ' active' : '');
    slide.dataset.id = v.id;
    slide.dataset.index = i;

    // Video element
    // Media element — native video for demo, iframe for YouTube/Dailymotion
    if (v.type === 'demo') {
      const vid = document.createElement('video');
      vid.src = v.videoUrl;
      vid.loop = true;
      vid.muted = isGlobalMuted;
      vid.playsInline = true;
      vid.preload = 'metadata';
      vid.setAttribute('playsinline', '');
      vid.addEventListener('timeupdate', onTimeUpdate);
      vid.addEventListener('loadedmetadata', () => {
        if (i === currentIndex) startProgress(vid);
      });
      slide.appendChild(vid);
    }
    // YouTube and Dailymotion iframes are injected by activateSlide()
    // when the slide becomes active — not pre-loaded for all slides —
    // to avoid simultaneous iframe load for every video in the feed.

    // Overlays
    const ot = document.createElement('div'); ot.className = 'overlay-top';
    const ob = document.createElement('div'); ob.className = 'overlay-bottom';
    slide.appendChild(ot); slide.appendChild(ob);

    // Info
    const info = document.createElement('div'); info.className = 'info-area';
    info.innerHTML = `<div class="username">${v.displayName}</div><div class="caption">${v.caption}</div>`;
    slide.appendChild(info);

    // Right actions
    const ra = document.createElement('div'); ra.className = 'right-actions';
    ra.innerHTML = `
      <div class="action" onclick="stampMoment(${i})">
        <div class="action-circle">⭐</div>
        <span>stamp</span>
      </div>
    `;
    slide.appendChild(ra);

    feed.appendChild(slide);
  });

  // Start first video
  activateSlide(0);

  // Swipe / scroll handling
  setupSwipe(feed);
  feed.addEventListener('wheel', e => {
    if (e.deltaY > 30) nextSlide();
    else if (e.deltaY < -30) prevSlide();
  }, { passive: true });

  // Show daily pick after 8 seconds
  setTimeout(triggerDailyPick, 8000);
  startVideoAdTimer(); // begin the 3-minute ad-break accumulation clock
}

function activateSlide(index) {
  const allSlides = document.querySelectorAll('.slide');
  slideIsActive = false; // pause ad counting while transitioning

  allSlides.forEach((s, i) => {
    const wasActive = s.classList.contains('active');
    s.classList.toggle('active', i === index);

    if (i === index) {
      // Activate this slide
      const meta = slides[i];
      if (meta.type === 'demo') {
        const vid = s.querySelector('video');
        if (vid) {
          vid.muted = isGlobalMuted;
          vid.play().catch(() => {});
          resetProgress();
          startProgress(vid);
        }
      } else {
        // Inject iframe — this is how we start playback for YT/DM
        _injectIframe(s, meta);
        resetProgress();
        // Progress bar animates as a fake fill for iframe videos since we
        // cannot read currentTime cross-origin. Simulates engagement.
        startFakeProgress();
      }
      videoStartTime = Date.now();
      slideIsActive = true;
    } else {
      // Deactivate this slide
      const vid = s.querySelector('video');
      if (vid) { vid.pause(); vid.currentTime = 0; }
      // Remove iframe to stop playback and free memory
      const iframe = s.querySelector('iframe');
      if (iframe) iframe.remove();
    }
  });

  resetReactionBar();
  currentIndex = index;
  startVideoTokenTimer(); // start/restart the 60-second token clock
}
// ── Progress ──────────────────────────────────────────────────────────────────
function startProgress(vid) {
  clearInterval(progressTimer);
  progressVal = 0;
  progressTimer = setInterval(() => {
    if (!vid.duration) return;
    progressVal = (vid.currentTime / vid.duration) * 100;
    document.getElementById('progress-fill').style.width = progressVal + '%';
    if (progressVal >= 99) clearInterval(progressTimer);
  }, 500);
}

function resetProgress() {
  clearInterval(progressTimer);
  document.getElementById('progress-fill').style.width = '0%';
}

 // For iframe slides we cannot read currentTime cross-origin.
// We show a slow-moving fake progress bar instead so the UI doesn't look broken.
function startFakeProgress() {
  clearInterval(progressTimer);
  progressVal = 0;
  const FAKE_DURATION_MS = 60000; // assume ~60 seconds per clip for the bar
  const startTime = Date.now();
  progressTimer = setInterval(() => {
    progressVal = Math.min(((Date.now() - startTime) / FAKE_DURATION_MS) * 100, 99);
    document.getElementById('progress-fill').style.width = progressVal + '%';
  }, 500);
}
 
function onTimeUpdate(e) {}

// ── Navigation ────────────────────────────────────────────────────────────────
function nextSlide() {
  if (currentIndex >= slides.length - 1) return;

  if (adBreakThresholdReached) {
    // Move to next slide first (user sees it briefly), then fire ad
    activateSlide(currentIndex + 1);
    // For demo type, pause the video element
    const activeSlide = document.querySelectorAll('.slide')[currentIndex];
    const vid = activeSlide?.querySelector('video');
    if (vid) { vid.pause(); clearInterval(progressTimer); }
    // For iframe types, remove the iframe so content isn't playing under the ad
    const iframe = activeSlide?.querySelector('iframe');
    if (iframe) { iframe.remove(); clearInterval(progressTimer); }
    slideIsActive = false;
    triggerVideoAdBreak();
    return;
  }

  activateSlide(currentIndex + 1);
}

  activateSlide(currentIndex + 1);
}
function prevSlide() {
  if (currentIndex > 0) activateSlide(currentIndex - 1);
}

// ── Touch / swipe / tap ───────────────────────────────────────────────────────
function setupSwipe(el) {
  let startY = null;
  let startX = null;
  let startTime = 0;

  el.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    startX = e.touches[0].clientX;
    startTime = Date.now();
  }, { passive: true });

  el.addEventListener('touchend', e => {
    if (startY === null) return;
    const endY = e.changedTouches[0].clientY;
    const endX = e.changedTouches[0].clientX;
    const dy = startY - endY;
    const dx = startX - endX;
    const elapsed = Date.now() - startTime;

    const isSwipe = Math.abs(dy) > 50 && Math.abs(dy) > Math.abs(dx);
    const isTap = Math.abs(dy) < 12 && Math.abs(dx) < 12 && elapsed < 300;

    if (isSwipe) {
      if (dy > 0) nextSlide();
      else prevSlide();
    } else if (isTap) {
      // Ignore taps that land on a button/control (reactions, stamp, etc.)
      if (!e.target.closest('.react-btn, .action, #top-bar, #daily-pick')) {
        toggleTapPause();
      }
    }

    startY = null; startX = null;
  }, { passive: true });

  // Mouse click fallback for desktop testing
  el.addEventListener('click', e => {
    if (!e.target.closest('.react-btn, .action, #top-bar, #daily-pick')) {
      toggleTapPause();
    }
  });
}

// ── Tap-to-pause/resume (TikTok-style) ────────────────────────────────────────
function toggleTapPause() {
  const activeSlide = document.querySelectorAll('.slide')[currentIndex];
  const type = slides[currentIndex]?.type;

  if (type === 'demo') {
    const vid = activeSlide?.querySelector('video');
    if (!vid) return;

    if (vid.paused) {
      if (!videoAdActive) {
        vid.play().catch(() => {});
        startProgress(vid);
        showCenterIcon('▶');
        slideIsActive = true;
      }
    } else {
      vid.pause();
      clearInterval(progressTimer);
      showCenterIcon('⏸');
      slideIsActive = false;
      if (adBreakThresholdReached) triggerVideoAdBreak();
    }
  } else {
    // For iframe slides: we cannot control play/pause cross-origin without
    // the YouTube IFrame API JS library (which we are not loading to keep
    // things simple). A tap on the video surface goes to the iframe natively
    // and YT/DM handles pause/play internally. We use the tap to check the
    // ad threshold only.
    if (adBreakThresholdReached) {
      slideIsActive = false;
      const iframe = activeSlide?.querySelector('iframe');
      if (iframe) iframe.remove();
      triggerVideoAdBreak();
    }
  }
}
function showCenterIcon(symbol) {
  let icon = document.getElementById('center-pause-icon');
  if (!icon) {
    icon = document.createElement('div');
    icon.id = 'center-pause-icon';
    icon.style.cssText = `
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: #fff; z-index: 25;
      opacity: 0; transition: opacity 0.2s;
      pointer-events: none;
    `;
    document.body.appendChild(icon);
  }
  icon.textContent = symbol;
  icon.style.opacity = '1';
  clearTimeout(icon._hideTimer);
  icon._hideTimer = setTimeout(() => { icon.style.opacity = '0'; }, 450);
}

// ── Reactions ─────────────────────────────────────────────────────────────────
function react(btn) {
  const emoji = btn.dataset.emoji;
  if (btn.classList.contains('tapped')) return; // already reacted with this one
  btn.classList.add('tapped');
  const countEl = btn.querySelector('.rcount');
  countEl.textContent = parseInt(countEl.textContent) + 1;

  sessionReactions[emoji] = (sessionReactions[emoji] || 0) + 1;
  addTokens(1, 'reacting ' + emoji);
  postToGodot({ type: 'reaction', emoji, videoId: slides[currentIndex]?.id, displayName: slides[currentIndex]?.displayName, reactions: sessionReactions });

  // Animate
  const clone = btn.querySelector('.emoji').cloneNode(true);
  clone.style.cssText = 'position:fixed;font-size:32px;pointer-events:none;z-index:99;transition:transform 0.8s,opacity 0.8s;';
  const rect = btn.getBoundingClientRect();
  clone.style.left = rect.left + 'px';
  clone.style.top  = rect.top + 'px';
  document.body.appendChild(clone);
  requestAnimationFrame(() => {
    clone.style.transform = 'translateY(-80px) scale(1.5)';
    clone.style.opacity = '0';
  });
  setTimeout(() => clone.remove(), 900);
}

function resetReactionBar() {
  document.querySelectorAll('.react-btn').forEach(b => {
    b.classList.remove('tapped');
    b.querySelector('.rcount').textContent = '0';
  });
}

// ── Stamp ─────────────────────────────────────────────────────────────────────
function stampMoment(slideIndex) {
  const activeSlides = document.querySelectorAll('.slide');
  const vid = activeSlides[slideIndex]?.querySelector('video');
  const ts = vid ? Math.round(vid.currentTime) : 0;
  const videoId = slides[slideIndex]?.id;
  const displayName = slides[slideIndex]?.displayName;

  sessionStamps.push({ videoId, displayName, timestamp: ts });
  addTokens(2, 'stamping a best moment');
  postToGodot({ type: 'stamp', videoId, displayName, timestamp: ts, stamps: sessionStamps });

  showToast('⭐ Stamped at ' + fmtTime(ts));
}

function fmtTime(s) {
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

// ── Daily pick ────────────────────────────────────────────────────────────────
function triggerDailyPick() {
  if (dailyPickShown) return;
  dailyPickShown = true;
  const pool = slides.slice(0, Math.min(3, slides.length));
  const opts = pool.map(v => ({ id: v.id, label: v.displayName }));
  const container = document.getElementById('pick-options');
  container.innerHTML = '';
  opts.forEach(opt => {
    const div = document.createElement('div');
    div.className = 'pick-option';
    div.innerHTML = `<span class="pick-icon">🎬</span><span class="pick-label">${opt.label}</span>`;
    div.onclick = () => choosePick(div, opt, opts);
    container.appendChild(div);
  });
  document.getElementById('daily-pick').classList.add('open');
}

function choosePick(el, chosen, all) {
  if (el.classList.contains('chosen')) return;
  document.querySelectorAll('.pick-option').forEach(d => d.classList.remove('chosen'));
  el.classList.add('chosen');
  sessionPicks.push({ chosen: chosen.id, options: all.map(o => o.id) });
  addTokens(1, 'daily pick vote');
  postToGodot({ type: 'daily_pick', chosen: chosen.id, options: all.map(o => o.id) });
  setTimeout(closeDailyPick, 1200);
}

function closeDailyPick() {
  document.getElementById('daily-pick').classList.remove('open');
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadVideos();
</script>
