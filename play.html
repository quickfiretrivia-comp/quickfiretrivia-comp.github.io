<!DOCTYPE html>
<html>
<head>
    <title>Game Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #game-frame {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Loading overlay — shown while game iframe is not yet loaded */
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #loading-screen p {
            color: #ffffff;
            font-family: sans-serif;
            font-size: 20px;
            letter-spacing: 2px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%   { opacity: 1; }
            50%  { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* No internet overlay — shown when connection is lost */
        #offline-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        #offline-screen p {
            color: #ffffff;
            font-family: sans-serif;
            font-size: 18px;
            text-align: center;
            padding: 0 32px;
            line-height: 1.6;
        }

        #offline-screen span {
            display: block;
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <!-- Shown while game is loading -->
    <div id="loading-screen">
        <p>LOADING GAME</p>
    </div>

    <!-- Shown when internet is off -->
    <div id="offline-screen">
        <span>📡</span>
        <p>Please connect to the internet.<br>The game will resume automatically.</p>
    </div>

    <iframe
        id="game-frame"
        src=""
        allowfullscreen
        allow="autoplay; fullscreen; payment"
        scrolling="no"
        frameborder="0">
    </iframe>

    <script>
        var params = new URLSearchParams(window.location.search);
        var gameId = params.get('id');

        var frame        = document.getElementById('game-frame');
        var loadingScreen = document.getElementById('loading-screen');
        var offlineScreen = document.getElementById('offline-screen');

        // The URL we need to (re)load
        var gameUrl = gameId ? 'https://html5.gamemonetize.com/' + gameId + '/' : null;

        if (!gameId) {
            loadingScreen.style.display = 'none';
            document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:40%;font-family:sans-serif'>Invalid Game Link</h2>";
        } else {

            // --- 1. Hide loading screen once the iframe has loaded content ---
            frame.addEventListener('load', function () {
                // Only hide loading if we are online — if offline the error
                // page would have fired load too, so we check first
                if (navigator.onLine) {
                    loadingScreen.style.display = 'none';
                }
            });

            // --- 2. Internet off: show offline screen, hide everything else ---
            window.addEventListener('offline', function () {
                offlineScreen.style.display = 'flex';
                loadingScreen.style.display = 'none';
            });

            // --- 3. Internet restored: hide offline screen, reload the game ---
            window.addEventListener('online', function () {
                offlineScreen.style.display = 'none';
                // Show loading while the game reloads
                loadingScreen.style.display = 'flex';
                // Force reload the iframe — this resumes from the game's
                // own checkpoint/save system if the game supports it
                frame.src = gameUrl;
            });

            // --- 4. Start loading the game ---
            // Check connectivity before we even try
            if (navigator.onLine) {
                frame.src = gameUrl;
            } else {
                // Already offline when the webview opened
                loadingScreen.style.display = 'none';
                offlineScreen.style.display = 'flex';
            }
        }
    </script>
</body>
</html>
