<!DOCTYPE html>
<html>
<head>
    <title>Game Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #game-frame {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <iframe 
        id="game-frame"
        src=""
        allowfullscreen
        allow="autoplay; fullscreen; payment"
        scrolling="no"
        frameborder="0">
    </iframe>

    <script>
        var params = new URLSearchParams(window.location.search);
        var gameId = params.get('id');

        if (gameId) {
            // This is the correct GameMonetize playable game embed URL
            document.getElementById('game-frame').src = 
                'https://html5.gamemonetize.com/' + gameId + '/';
        } else {
            document.body.innerHTML = 
                "<h2 style='color:white;text-align:center;margin-top:40%'>Invalid Game Link</h2>";
        }
    </script>
</body>
</html>
