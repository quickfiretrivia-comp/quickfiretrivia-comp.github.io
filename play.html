<!DOCTYPE html>
<html>
<head>
    <title>Game Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #game-frame {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* --- ADD THIS: Portrait-specific overrides --- */
        @media screen and (orientation: portrait) {
            #game-frame {
                /* In portrait, some games may be taller than the screen.
                   overflow: auto on a fixed iframe won't work, so we
                   switch to absolute positioning to allow natural scroll
                   only if the game content exceeds the viewport height. */
                position: absolute;
                width: 100%;
                height: 100%;
                min-height: 100vh;
            }

            body, html {
                /* Allow vertical scroll only in portrait if game overflows */
                overflow-y: auto;
                overflow-x: hidden;
            }
        }
        /* --- END PORTRAIT OVERRIDES --- */

        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #loading-screen p {
            color: #ffffff;
            font-family: sans-serif;
            font-size: 20px;
            letter-spacing: 2px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%   { opacity: 1; }
            50%  { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <p>CONNECTING TO SERVERS</p>
    </div>
    <iframe
        id="game-frame"
        src=""
        allowfullscreen
        allow="autoplay; fullscreen; payment"
        scrolling="no"
        frameborder="0">
    </iframe>
    <script>
        var params = new URLSearchParams(window.location.search);
        var gameId = params.get('id');
        var frame         = document.getElementById('game-frame');
        var loadingScreen = document.getElementById('loading-screen');
        var gameUrl       = gameId ? 'https://html5.gamemonetize.com/' + gameId + '/' : null;

        if (!gameId) {
            loadingScreen.style.display = 'none';
            document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:40%;font-family:sans-serif'>Invalid Game Link</h2>";
        } else {
            frame.addEventListener('load', function () {
                if (navigator.onLine) {
                    loadingScreen.style.display = 'none';
                }
            });

            window.addEventListener('online', function () {
                loadingScreen.style.display = 'flex';
                frame.src = gameUrl;
            });

            // --- ADD THIS: re-fit the iframe on orientation change ---
            window.addEventListener('orientationchange', function () {
                // Small delay lets the browser finish rotating before we resize
                setTimeout(function () {
                    frame.style.width  = window.innerWidth  + 'px';
                    frame.style.height = window.innerHeight + 'px';
                }, 300);
            });
            // --- END ADDITION ---

            if (navigator.onLine) {
                frame.src = gameUrl;
            } else {
                loadingScreen.style.display = 'none';
            }
        }
    </script>
</body>
</html>
