<!DOCTYPE html>
<html>
<head>
    <title>Game Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #game-frame {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #loading-screen p {
            color: #ffffff;
            font-family: sans-serif;
            font-size: 20px;
            letter-spacing: 2px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%   { opacity: 1; }
            50%  { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <p>CONNECTING TO SERVERS</p>
    </div>

    <iframe
        id="game-frame"
        src=""
        allowfullscreen
        allow="autoplay; fullscreen; payment"
        scrolling="no"
        frameborder="0">
    </iframe>

    <script>
        var params = new URLSearchParams(window.location.search);
        var gameId = params.get('id');

        var frame         = document.getElementById('game-frame');
        var loadingScreen = document.getElementById('loading-screen');
        var gameUrl       = gameId ? 'https://html5.gamemonetize.com/' + gameId + '/' : null;

        if (!gameId) {
            loadingScreen.style.display = 'none';
            document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:40%;font-family:sans-serif'>Invalid Game Link</h2>";
        } else {

            // Hide loading screen once iframe content has loaded
            frame.addEventListener('load', function () {
                if (navigator.onLine) {
                    loadingScreen.style.display = 'none';
                }
            });

            // When internet is restored (after Kotlin offline page showed),
            // the Kotlin WebViewClient reloads — this catches it if the page
            // itself regains connection awareness
            window.addEventListener('online', function () {
                loadingScreen.style.display = 'flex';
                frame.src = gameUrl;
            });

            // Load the game
            if (navigator.onLine) {
                frame.src = gameUrl;
            } else {
                // Kotlin will have already shown the offline page at this point
                loadingScreen.style.display = 'none';
            }
        }
    </script>
</body>
</html>
