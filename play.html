<!DOCTYPE html>
<html>
<head>
    <title>Arcade Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #gamemonetize-video { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div id="gamemonetize-video"></div>
    
    <script type="text/javascript">
        // 1. Get Game ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const gameIdFromUrl = urlParams.get('id'); 

        // 2. Only run if ID exists
        if (gameIdFromUrl) {
            console.log("Loading Game: " + gameIdFromUrl);
            
            window.VIDEO_OPTIONS = {
                gameid : gameIdFromUrl,
                width  : "100%",
                height : "100%",
                color  : "#141414",
                getAds : "true" 
            };

            // 3. Use a more robust loading method
            function loadGameSDK() {
                var script = document.createElement("script");
                script.id = "gamemonetize-video-api";
                script.type = "text/javascript";
                // Forced HTTPS to prevent Mixed Content blocks in Android
                script.src = "https://api.gamemonetize.com/video.js";
                
                script.onload = function() {
                    console.log("GameMonetize SDK Loaded successfully.");
                };
                
                script.onerror = function() {
                    console.error("Failed to load GameMonetize SDK. Check internet or ads.txt.");
                };

                document.head.appendChild(script);
            }

            // 4. Wait for the page to be fully ready before calling the SDK
            if (document.readyState === 'complete') {
                loadGameSDK();
            } else {
                window.addEventListener('load', loadGameSDK);
            }

        } else {
            document.body.innerHTML = "<h2 style='color:white; text-align:center;'>Invalid Game Link</h2>";
            console.error("No Game ID provided in URL.");
        }
    </script>
</body>
</html>
